<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS ex-2</title>
    <style>
        h2 {
            color: darkorange;
        }

        .blue_text {
            color: blue;
        }

        #red_text {
            color: red;
        }
    </style>
</head>

<body>

    <hr>
    <h2 class="blue_text">클래스 셀렉터 적용</h2>
    <hr>
    <h2 id="red_text">아이디 셀렉터 적용</h2>
</body>
